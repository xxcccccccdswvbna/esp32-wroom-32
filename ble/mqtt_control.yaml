mqtt:
  on_message:
    # ================= 监听 Dev1 =================
    # 监听 Dev1 灯 (主题: light01)
    - topic: light01
      then:
        - lambda: |-
            if (x == "on" || x == "1") {
              id(dev1_power).publish_state(true);
              id(dev1_brt).make_call().set_option("100%").perform(); // 开灯默认100%
            } else if (x == "off" || x == "0") {
              id(dev1_power).publish_state(false);
              id(dev1_brt).make_call().set_option("0%").perform();
            }

    # 监听 Dev1 风扇 (主题: fan01)
    - topic: fan01
      then:
        - lambda: |-
            if (x == "off" || x == "0") {
              id(dev1_fan_select).make_call().set_option("关").perform();
            } else {
              // 巴法云风扇发的是 1, 2, 3，我们需要转换成 "1 档", "2 档"
              std::string gear = x + " 档";
              id(dev1_fan_select).make_call().set_option(gear).perform();
            }

    # ================= 监听 Dev2 =================
    # 监听 Dev2 灯 (主题: light02)
    - topic: light02
      then:
        - lambda: |-
            if (x == "on" || x == "1") {
              id(dev2_power).publish_state(true);
              id(dev2_brt).make_call().set_option("100%").perform();
            } else if (x == "off" || x == "0") {
              id(dev2_power).publish_state(false);
              id(dev2_brt).make_call().set_option("0%").perform();
            }

    # 监听 Dev2 风扇 (主题: fan02)
    - topic: fan02
      then:
        - lambda: |-
            if (x == "off" || x == "0") {
              id(dev2_fan_select).make_call().set_option("关").perform();
            } else {
              std::string gear = x + " 档";
              id(dev2_fan_select).make_call().set_option(gear).perform();
            }
