mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 9501  # 核心修改：巴法云专用端口
  
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: !secret mqtt_username  # 核心修改：巴法云要求 client_id 也是私钥
  
  discovery: false  # 核心修改：关闭 HA 自动发现，防止被巴法云踢下线
  
  keepalive: 30s
  reboot_timeout: 300s
  
  # 核心修改：清空 birth 和 will 消息，巴法云不支持这些自定义格式
  birth_message:
  will_message:
