mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 9501
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: !secret mqtt_username
  discovery: false
  keepalive: 30s
  reboot_timeout: 300s
  birth_message:
  will_message:

  on_connect:
    then:
      - mqtt.publish: { topic: "light1002/up", payload: "off" }
      - mqtt.publish: { topic: "fan1003/up", payload: "0" }
      - mqtt.publish: { topic: "light2002/up", payload: "off" }
      - mqtt.publish: { topic: "fan2003/up", payload: "0" }

  on_message:
    - topic: light1002
      then:
        - if: { condition: { lambda: 'return x == "on" || x == "1" || x == "打开" || x == "开灯";' }, then: [ { lambda: 'id(current_target) = 1; id(state_dev1_brt).make_call().set_option("100%").perform();' }, { mqtt.publish: { topic: "light1002/up", payload: "on" } } ] }
        - if: { condition: { lambda: 'return x == "off" || x == "0" || x == "关闭" || x == "关灯";' }, then: [ { button.press: dev1_light_toggle }, { mqtt.publish: { topic: "light1002/up", payload: "off" } } ] }
    - topic: fan1003
      then:
        - if: { condition: { lambda: 'return x == "off" || x == "0" || x == "关闭";' }, then: [ { lambda: 'id(current_target) = 3; id(state_dev1_fan).make_call().set_option("关").perform();' }, { mqtt.publish: { topic: "fan1003/up", payload: "0" } } ] }
        - if: { condition: { lambda: 'return x == "1" || x == "1档" || x == "一档";' }, then: [ { lambda: 'id(current_target) = 3; id(state_dev1_fan).make_call().set_option("1 档").perform();' }, { mqtt.publish: { topic: "fan1003/up", payload: "1" } } ] }
        - if: { condition: { lambda: 'return x == "2" || x == "2档" || x == "二档";' }, then: [ { lambda: 'id(current_target) = 3; id(state_dev1_fan).make_call().set_option("2 档").perform();' }, { mqtt.publish: { topic: "fan1003/up", payload: "2" } } ] }
        - if: { condition: { lambda: 'return x == "3" || x == "3档" || x == "三档";' }, then: [ { lambda: 'id(current_target) = 3; id(state_dev1_fan).make_call().set_option("3 档").perform();' }, { mqtt.publish: { topic: "fan1003/up", payload: "3" } } ] }
    - topic: light2002
      then:
        - if: { condition: { lambda: 'return x == "on" || x == "1" || x == "打开" || x == "开灯";' }, then: [ { lambda: 'id(current_target) = 4; id(state_dev2_brt).make_call().set_option("100%").perform();' }, { mqtt.publish: { topic: "light2002/up", payload: "on" } } ] }
        - if: { condition: { lambda: 'return x == "off" || x == "0" || x == "关闭" || x == "关灯";' }, then: [ { button.press: dev2_light_toggle }, { mqtt.publish: { topic: "light2002/up", payload: "off" } } ] }
    - topic: fan2003
      then:
        - if: { condition: { lambda: 'return x == "off" || x == "0" || x == "关闭";' }, then: [ { lambda: 'id(current_target) = 6; id(state_dev2_fan).make_call().set_option("关").perform();' }, { mqtt.publish: { topic: "fan2003/up", payload: "0" } } ] }
        - if: { condition: { lambda: 'return x == "1" || x == "1档" || x == "一档";' }, then: [ { lambda: 'id(current_target) = 6; id(state_dev2_fan).make_call().set_option("1 档").perform();' }, { mqtt.publish: { topic: "fan2003/up", payload: "1" } } ] }
        - if: { condition: { lambda: 'return x == "2" || x == "2档" || x == "二档";' }, then: [ { lambda: 'id(current_target) = 6; id(state_dev2_fan).make_call().set_option("2 档").perform();' }, { mqtt.publish: { topic: "fan2003/up", payload: "2" } } ] }
        - if: { condition: { lambda: 'return x == "3" || x == "3档" || x == "三档";' }, then: [ { lambda: 'id(current_target) = 6; id(state_dev2_fan).make_call().set_option("3 档").perform();' }, { mqtt.publish: { topic: "fan2003/up", payload: "3" } } ] }
