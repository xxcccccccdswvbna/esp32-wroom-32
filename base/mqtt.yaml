mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  
  # 断线重连与心跳
  reboot_timeout: 300s
  keepalive: 60s
  
  # 上线/掉线通知 (可选，方便在 HA 或 MQTT 客户端看状态)
  birth_message:
    topic: "ct1/status"
    payload: "online"
  will_message:
    topic: "ct1/status"
    payload: "offline"
